<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Background & Icon Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <linearGradient id="lens-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.3" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Card -->
  <rect x="5" y="5" width="90" height="90" rx="24" fill="url(#bg-grad)" />

  <!-- Polaroid / Journal Outer Border -->
  <rect x="22" y="20" width="56" height="50" rx="6" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.9" />
  <line x1="22" y1="58" x2="78" y2="58" stroke="#ffffff" stroke-width="3" opacity="0.9" />

  <!-- Shutter Lens / Memory Center -->
  <circle cx="50" cy="39" r="12" fill="url(#lens-grad)" stroke="#ffffff" stroke-width="2" />
  
  <!-- Shutter blades details -->
  <path d="M 44 30 L 52 30" stroke="#ffffff" stroke-width="1.5" opacity="0.7" />
  <path d="M 39 39 L 45 45" stroke="#ffffff" stroke-width="1.5" opacity="0.7" />
  <path d="M 50 51 L 50 45" stroke="#ffffff" stroke-width="1.5" opacity="0.7" />

  <!-- Small Camera Flash/Indicator -->
  <circle cx="70" cy="28" r="2.5" fill="#f43f5e" filter="url(#glow)" />

  <!-- Journal Binding Rings (left edge representation) -->
  <circle cx="16" cy="32" r="2.5" fill="#ffffff" opacity="0.8" />
  <path d="M 16 32 C 19 32 19 36 16 36" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.8" />

  <circle cx="16" cy="48" r="2.5" fill="#ffffff" opacity="0.8" />
  <path d="M 16 48 C 19 48 19 52 16 52" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.8" />

  <circle cx="16" cy="64" r="2.5" fill="#ffffff" opacity="0.8" />
  <path d="M 16 64 C 19 64 19 68 16 68" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.8" />

  <!-- Signature / Handwriting lines on polaroid bottom -->
  <path d="M 32 65 C 36 63 38 67 42 65 C 46 63 50 64 54 65 C 58 66 64 64 68 65" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.8" />
</svg>
